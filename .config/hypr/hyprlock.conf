source = ~/.cache/wal/colors-hyprland.conf

general {
    hide_cursor = false
    grace = 0
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 8
}

input-field {
    monitor =
    size = 280, 45
    outline_thickness = 0
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    dots_rounding = -1
    outer_color = rgba(255, 255, 255, 0.0)
    inner_color = rgba(255, 255, 255, 0.05)
    font_color = rgba(255, 255, 255, 1.0)
    fade_on_empty = false
    placeholder_text = <span foreground="##ffffff">Введи пароль</span>
    hide_input = false
    rounding = 10
    check_color = rgba(100, 255, 100, 1.0)
    fail_color = rgba(255, 100, 100, 1.0)
    fail_text = <span foreground="##ff6666">Неверный пароль!</span>
    fail_timeout = 2000
    fail_transitions = 300
    position = 0, -120
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 6
}

label {
    monitor =
    text = $TIME
    color = rgba(255, 255, 255, 1.0)
    font_size = 70
    font_family = CodeNewRoman Nerd Font Propo
    position = 0, 150
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 4
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d %B')"
    color = rgba(255, 255, 255, 0.9)
    font_size = 22
    font_family = CodeNewRoman Nerd Font Propo
    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

label {
    monitor =
    text = Привет, $USER!
    color = rgba(255, 255, 255, 0.9)
    font_size = 28
    font_family = CodeNewRoman Nerd Font Propo
    position = 0, 20
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
}

label {
    monitor =
    text = 
    color = rgba(255, 255, 255, 0.8)
    font_size = 24
    font_family = CodeNewRoman Nerd Font Propo
    position = 0, -220
    halign = center
    valign = center
}
